<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agro Forte: Futuro Sustentável</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-block">
        <span class="logo-icon">🌾</span>
        <div>
          <h1 class="logo-title">AGRO FORTE</h1>
          <p class="logo-sub">Futuro Sustentável</p>
        </div>
      </div>
      <p class="header-tagline">Equilíbrio entre Produção e Meio Ambiente</p>
    </div>
  </header>

  <!-- SCOREBOARD -->
  <section class="scoreboard">
    <div class="score-wrap">
      <div class="score-card prod">
        <span class="score-icon">🌾</span>
        <span class="score-label">Produção</span>
        <span class="score-val" id="prod-score">5</span>
      </div>
      <div class="phase-badge">
        <span id="phase-indicator">Fase 1 de 5</span>
      </div>
      <div class="score-card env">
        <span class="score-icon">🌿</span>
        <span class="score-label">Meio Ambiente</span>
        <span class="score-val" id="env-score">5</span>
      </div>
    </div>
  </section>

  <!-- PROGRESS BAR -->
  <div class="progress-container">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <!-- MAIN GAME AREA -->
  <main class="main-area">
    <div id="game-area"></div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>"O futuro do agronegócio depende do equilíbrio entre produtividade, inovação e preservação ambiental."</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
